<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="AI4AI public access test page">
  <title>AI4AI · Public Access Test</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #090d18;
      color: #eef2ff;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(69, 107, 255, .28), transparent 34rem),
        radial-gradient(circle at 80% 75%, rgba(167, 78, 255, .24), transparent 30rem),
        #090d18;
    }

    main {
      width: min(720px, calc(100% - 32px));
      padding: clamp(28px, 6vw, 56px);
      border: 1px solid rgba(255, 255, 255, .13);
      border-radius: 28px;
      background: rgba(13, 19, 36, .76);
      box-shadow: 0 30px 90px rgba(0, 0, 0, .4);
      backdrop-filter: blur(18px);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 8px 13px;
      border: 1px solid rgba(125, 211, 252, .28);
      border-radius: 999px;
      color: #bae6fd;
      background: rgba(14, 116, 144, .14);
      font-size: 14px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 18px #4ade80;
    }

    h1 {
      margin: 26px 0 12px;
      font-size: clamp(44px, 10vw, 86px);
      line-height: .92;
      letter-spacing: -.065em;
    }

    h1 span {
      color: transparent;
      background: linear-gradient(105deg, #7dd3fc, #a78bfa 55%, #f0abfc);
      background-clip: text;
      -webkit-background-clip: text;
    }

    p {
      max-width: 590px;
      margin: 0;
      color: #b9c2d9;
      font-size: clamp(17px, 2.5vw, 21px);
      line-height: 1.7;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 24px;
      margin-top: 34px;
      padding-top: 24px;
      border-top: 1px solid rgba(255, 255, 255, .1);
      color: #7f8ba8;
      font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    a { color: #7dd3fc; }
  </style>
</head>
<body>
  <main>
    <div class="badge"><span class="dot"></span>Public page is online</div>
    <h1><span>AI4AI</span></h1>
    <p>
      如果你能看到这个页面，说明 AI4AI 的静态网页已经可以从外部网络公开访问。
      这是一个最小部署测试页面。
    </p>
    <div class="meta">
      <span>repository: couragec/AI4AI</span>
      <span>deployed: 2026-07-15</span>
    </div>
  </main>
</body>
</html>
